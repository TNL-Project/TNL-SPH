# render_config.toml
# Place this next to your .pvsm files.
# All paths are relative to the directory containing this file,
# unless they start with / (absolute).

results_dir     = "results"
screenshots_dir = "results/postpro"

pvpython        = "pvpython"
settle_time     = 2.0
worker_threads  = 1

# VTK filename patterns to watch for (Python regex)
patterns = [
    'fluid_subdomain0_[\d.]+_particles\.vtk$',
    'fluid_subdomain1_[\d.]+_particles\.vtk$',
]

# Template for matching particle-set filenames in .pvsm state files.
# {id} identifies the particle set (subdomain index), {time} is the timestep.
particle_filename_template = "fluid_subdomain{id}_{time}_particles.vtk"

# Number of VTK files written per timestep — group these before rendering.
expected_files_per_timestep = 2

# Project root for resolving {project_dir} placeholders in .pvsm files.
project_dir = "../../.."

# label = "path/to/state.pvsm"  (relative to this file's directory)
[states]
velocity = "results_multiresolution_velocity_3d_view.pvsm"
velocity_interface = "results_multiresolution_velocity.pvsm"
velocity_interface_side_view = "results_multiresolution_velocity_side_view.pvsm"
